<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стажёр Апокалипсиса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #FCF6D9;
  --dark:  #1a1208;
  --gold:  #c8a84b;
}

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #000000;
  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

/* ━━━ SLIDE ENGINE ━━━ */
/* #dyn has pointer-events:none to not block slides outside it,
   but active slides inside must be clickable */
#dyn .slide.active { pointer-events: all; }

:root {
  --v-pad: 20px;
}

#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--v-pad) 0;
  background: #000;
}

#stage-inner {
  height: calc(100vh - var(--v-pad) * 2);
  width: min(100vw, calc((100vh - var(--v-pad) * 2) * 16 / 9));
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.slide {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: none;
  opacity: 1;
}
.slide.active  { display: flex; }
.slide.visible { opacity: 1; }

/* ━━━ SLIDE: INTRO VIDEO ━━━ */
#s-intro {
  background: #000;
  align-items: center; justify-content: center;
}
#intro-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* ━━━ FULL-SCREEN IMAGE SLIDE ━━━ */
.img-slide { position: relative; overflow: hidden; width: 100%; height: 100%; }
#s-last.active { display: block; }
.slide-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  pointer-events: none;   /* never block clicks on elements above */
}

/* ━━━ FLOATING POPUPS ━━━ */
.popup {
  position: absolute;
  object-fit: contain;
  z-index: 5;
  opacity: 0; transition: opacity .8s ease;
  /* No transform — all positioned via left/top + explicit width/height */
}
/* pi1: text block */
#pi1 {
  left: 29.0%; top: 6.4%;
  width: 67.4%; height: 54.0%;
}
/* pi2: "Начать стажировку" button */
#pi2 {
  left: 40.7%; top: 70.0%;
  width: 46.0%; height: 15.7%;
}
/* last-slide popups */
#lp1 { left: 5.315%; top: 2.99%;  width: 32.765%; height: 32.12%; }
#lp2 { left: 7.14%;  top: 70.97%; width: 33.28%;  height: 21.78%; }
#lp3 { left: 62.17%; top: 70.97%; width: 33.37%; height: 21.78%; }
/* last-slide overlays */
.last-ov { position: absolute; z-index: 10; cursor: pointer; }
#lov2 { left: 7.14%;  top: 70.97%; width: 33.28%; height: 21.78%; }
#lov3 { left: 62.17%; top: 70.97%; width: 33.37%; height: 21.78%; }
.popup.show { opacity: 1; }
.popup.clickable { cursor: pointer; }
.popup.clickable:hover { filter: brightness(1.08); }

/* ━━━ MISSION ICON (pulsing) ━━━ */
.mission-icon {
  position: absolute;
  /* Icon is square: 5.5% of slide width.
     Height = 5.5% * (16/9) to stay square in 16:9 slide → ~9.8% but that makes it tall.
     Use same % for both and accept slight squish, or use a fixed size approach:
     width and height both as % of width via padding-bottom trick — 
     simplest: just use equal vw-based size */
  width: 5.5%;
  height: 9.8%;
  object-fit: contain; cursor: pointer;
  z-index: 100;
  pointer-events: all !important;
  padding: 0;
  box-sizing: border-box;
  animation: pulse-icon 1.1s ease-in-out infinite;
}
@keyframes pulse-icon {
  0%,100% { transform: scale(1);   }
  50%      { transform: scale(1.2); }
}
/* ── Per-icon positions — top-left corner from red-box screenshot 2 ── */
#icon-map0 { left: 51.85%; top: 43.34%; }
#ico1      { left: 60.44%; top: 50.25%; }
#ico2      { left: 68.68%; top: 45.34%; }
#ico3      { left: 62.16%; top: 32.48%; }
#ico4      { left: 51.85%; top: 25.12%; }
#ico5      { left: 61.13%; top: 14.71%; }
#ico6      { left: 71.77%; top: 14.71%; }
#ico7      { left: 75.21%; top: 32.48%; }
#ico8      { left: 78.30%; top: 48.41%; }
#ico9      { left: 84.13%; top: 33.09%; }


/* ━━━ SCALES PANEL ━━━ */
.scales-panel {
  position: absolute;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}
/* Icons and deltas are positioned inline via JS */

/* ━━━ REPORT BOX ━━━ */
.report-box {
  position: absolute;
  bottom: 3%; left: 3%; right: 3%;
  height: 18%;
  border: 2px solid #B79261;
  border-radius: 4px;
  padding: 2% 2.5%;
  font-family: 'Franklin Gothic Book', 'Arial Narrow', Arial, sans-serif;
  font-weight: 400;
  font-size: clamp(28px,3vh,38px); line-height: 1.55;
  color: var(--cream);
  background: rgba(15,8,2,.72);
  z-index: 15; opacity: 0; transition: opacity .25s ease;
  display: flex; align-items: center;
  pointer-events: none;
}
.report-box.show { opacity: 1; }

/* ━━━ SLIDE: CASUS ━━━ */
#s-casus {
  background: var(--cream);
  position: relative;
  overflow: hidden;
}

/* ── Header: x=3.6% y=6% → x=96.4% y=12.1% ── */
.casus-header {
  position: absolute;
  left: 3.6%; top: 6%;
  width: 92.8%;   /* 96.4−3.6 */
  height: 6.1%;   /* 12.1−6 */
  display: flex; align-items: center; gap: 10px;
  overflow: hidden;
}
.cas-num {
  font-family: 'Caveat', cursive; font-style: italic; font-weight: 700;
  font-size: 36px; color: var(--dark);
  line-height: 1; white-space: nowrap; flex-shrink: 0;
}
.cas-sep { width: 2px; flex-shrink: 0; }
.cas-title {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: 28px; color: #561643; line-height: 1.15;
}

/* ── casus-body: invisible wrapper ── */
.casus-body { display: contents; }

/* ── Left block: x=3.6% y=15.43% → x=46.3% y=94% ── */
.casus-left {
  position: absolute;
  left: 3.6%; top: 15.43%;
  width: 42.7%;   /* 46.3−3.6 */
  height: 78.57%; /* 94−15.43 */
  display: flex; flex-direction: column;
  overflow: hidden;
}
.cas-top-block { flex-shrink: 0; }
.cas-desc {
  font-family: 'Franklin Gothic Book', 'Arial Narrow', Arial, sans-serif;
  font-weight: 400; font-size: 28px; line-height: 1.55;
  color: var(--dark); margin-bottom: 0;
  white-space: pre-line;
}
.cas-q {
  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
  font-weight: 700; font-size: 28px; color: var(--dark);
  margin-top: 4%; margin-bottom: 0;
}
.cas-options-block {
  flex-shrink: 0;
  margin-top: calc(28px * 1.55 * 1); /* 1 empty line */
}
.options-list { list-style: none; display: flex; flex-direction: column; }
.opt {
  display: flex; align-items: flex-start; gap: calc(0.5% + 10px);
  cursor: pointer; padding: 2.5% 0;
  border-bottom: 1px solid rgba(26,18,8,.08);
  transition: background .15s;
}
.opt:last-child { border-bottom: none; }
.opt:hover { background: rgba(26,18,8,.04); }
.opt.sel { background: rgba(200,168,75,.12); }
.opt-radio {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 1.5px solid var(--dark); border-radius: 50%;
  margin-top: calc((1.45 * 28px - 14px) / 2);
  position: relative;
}
.opt.sel .opt-radio { border-color: var(--gold); }
.opt.sel .opt-radio::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%;
}
.opt-text {
  font-family: 'Franklin Gothic Book', 'Arial Narrow', Arial, sans-serif;
  font-weight: 400; font-size: 28px; line-height: 1.5;
  color: var(--dark);
}

/* ── Right block: x=49.9% y=15.43% → x=96.4% y=94% ── */
.casus-right {
  position: absolute;
  left: 49.9%; top: 15.43%;
  width: 46.5%;   /* 96.4−49.9 */
  height: 78.57%; /* 94−15.43 */
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.cas-img {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  object-fit: contain; display: block;
}
.btn-submit { display: none; }

/* ━━━ FINAL OVERVIEW SLIDES ━━━ */
.s-final { position: relative; overflow: hidden; }
.final-scales {
  position: absolute; inset: 0;
  z-index: 10; opacity: 0; transition: opacity .8s ease;
  pointer-events: none;
}
.final-scales.show { opacity: 1; }
.fs-item { position: absolute; }
.fs-name {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: 10px; color: var(--cream);
  text-shadow: 0 1px 5px rgba(0,0,0,.9);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.fs-val {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: clamp(26px,4.5vw,52px); color: var(--cream);
  text-shadow: 0 2px 8px rgba(0,0,0,.8), 0 0 24px rgba(200,168,75,.35);
  line-height: 1.05;
}
.final-formular {
  position: absolute;
  left: 37.76%; top: -100%;
  width: 35.67%; height: auto;
  object-fit: contain; z-index: 10;
  opacity: 1;
  transform-origin: top left;
  transform: rotate(0deg);
  transition: top 0.47s cubic-bezier(.22,1,.36,1), transform 0.33s ease 0.4s;
}
.final-formular.show {
  top: 18%;
  transform: rotate(-15deg);
}
.final-btn {
  position: absolute;
  z-index: 20; cursor: pointer;
  opacity: 0; transition: opacity .5s ease;
  pointer-events: none;
}
.final-btn.show { opacity: 1; pointer-events: auto; }
.final-btn:hover { filter: brightness(1.08); }
.final-btn-next { position:absolute; left: 65.54%; top: 110%; width: 31.86%; height: auto; object-fit: contain; transition: top 0.47s cubic-bezier(.22,1,.36,1), opacity .5s ease; filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.2)); }
.final-btn-concl { position:absolute; left: 65.54%; top: 110%; width: 31.86%; height: auto; object-fit: contain; transition: top 0.47s cubic-bezier(.22,1,.36,1), opacity .5s ease; filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.2)); }
.final-btn-next.show, .final-btn-concl.show { top: 89.39%; opacity: 1; pointer-events: auto; }


/* ━━━ MOBILE / PORTRAIT ━━━ */
@media (orientation: portrait) {

  /* Stage: full screen, no padding */
  #stage { padding: 0; }

  /* Stage-inner: 9:16 aspect ratio */
  #stage-inner {
    height: 100vh;
    width: min(100vw, calc(100vh * 9 / 16));
  }

  /* Report box: smaller font */
  .report-box {
    font-size: clamp(14px, 2.2vh, 22px);
    height: 20%;
    bottom: 2%; left: 2%; right: 2%;
    padding: 2% 3%;
  }

  /* ── Casus slide ── */
  .casus-header {
    left: 3%; top: 3%;
    width: 94%; height: 8%;
  }
  .cas-num  { font-size: clamp(18px, 3.5vw, 28px); }
  .cas-title { font-size: clamp(13px, 2.4vw, 20px); }

  /* Single-column layout for casus */
  .casus-left {
    left: 3%; top: 13%;
    width: 94%;
    height: 52%;
  }
  .cas-desc {
    font-size: clamp(13px, 2.2vw, 18px);
    line-height: 1.45;
  }
  .cas-q {
    font-size: clamp(13px, 2.2vw, 18px);
    margin-top: 2%;
  }
  .cas-options-block { margin-top: 1.5%; }
  .opt-text { font-size: clamp(12px, 2vw, 17px); line-height: 1.4; }
  .opt { padding: 1.8% 0; }
  .opt-radio {
    width: 11px; height: 11px;
    margin-top: calc((1.4 * 16px - 11px) / 2);
  }

  /* Image: below text block */
  .casus-right {
    left: 3%; top: 67%;
    width: 94%; height: 30%;
  }

  /* Submit button */
  .btn-submit {
    display: flex;
    position: absolute;
    left: 3%; bottom: 3%;
    width: 94%;
    padding: 3% 0;
    background: var(--gold);
    color: var(--dark);
    border: none; border-radius: 6px;
    font-family: 'Franklin Gothic Medium', Arial, sans-serif;
    font-size: clamp(14px, 2.4vw, 20px);
    font-weight: 700; cursor: pointer;
    align-items: center; justify-content: center;
    z-index: 30;
    transition: background .15s;
  }
  .btn-submit:active { background: #b8942e; }
  .btn-submit:disabled { opacity: 0.4; cursor: default; }
}

/* ━━━ DEBUG: clickable zones ━━━ */
/* ━━━ PRELOADER ━━━ */
#preloader {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
  transition: opacity 0.6s ease;
}
#preloader.fade-out { opacity: 0; pointer-events: none; }
.pre-title {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: clamp(18px, 3vw, 32px);
  color: var(--cream);
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(200,168,75,.6);
}
.pre-bar-wrap {
  width: clamp(200px, 40vw, 380px);
  height: 4px;
  background: rgba(252,246,217,.15);
  border-radius: 2px;
  overflow: hidden;
}
.pre-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #c8a84b, #f0d87a, #c8a84b);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.pre-pct {
  font-family: 'Playfair Display', serif;
  font-size: 13px; color: rgba(252,246,217,.55);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div id="stage"><div id="stage-inner">

<div id="preloader">
  <div class="pre-title">СТАЖЁР АПОКАЛИПСИСА</div>
  <div class="pre-bar-wrap"><div class="pre-bar" id="pre-bar"></div></div>
  <div class="pre-pct" id="pre-pct">0%</div>
  <div style="margin-top:24px;font-size:12px;color:rgba(252,246,217,.4);font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;letter-spacing:1px;text-align:center;">Для смартфона используйте горизонтальное положение</div>
</div>


<!-- INTRO VIDEO -->
<div class="slide" id="s-intro">
  <video id="intro-video" autoplay playsinline preload="auto">
    <source src="https://alexautro.github.io/apo_intern/images/intern_intro.mp4" type="video/mp4">
  </video>
  <button id="btn-skip-debug" onclick="skipIntro()" style="
    position:absolute; bottom:28px; right:28px; z-index:100;
    background:rgba(255,80,80,.75); border:2px solid #ff5050;
    color:#fff; padding:8px 20px; font-size:13px; font-family:monospace;
    letter-spacing:1px; cursor:pointer; border-radius:3px;">
    [DEBUG] ПРОПУСТИТЬ →
  </button>
</div>

<!-- MAP INTRO -->
<div class="slide img-slide" id="s-map-intro">
  <img class="slide-bg" src="https://alexautro.github.io/apo_intern/images/map_intro.png" alt="">
  <img class="popup"              id="pi1" src="https://alexautro.github.io/apo_intern/images/map_intro_1.png" alt="">
  <img class="popup clickable" id="pi2" src="https://alexautro.github.io/apo_intern/images/map_intro_2.png" alt="">

<!-- PRIMARY MAP -->
<div class="slide img-slide" id="s-map0">
  <img class="slide-bg" src="https://alexautro.github.io/apo_intern/images/map_00.png" alt="">
  <img class="mission-icon" id="icon-map0"
       src="https://alexautro.github.io/apo_intern/images/mission_01.png" alt="">
  <div id="hotspot-map0" style="position:absolute;left:51.85%;top:43.34%;width:5.5%;height:9.8%;z-index:9999;cursor:pointer;" onclick="goCasus(0)"></div>

<!-- CASUS SLIDE -->
<div class="slide" id="s-casus">
  <div class="casus-header">
    <span class="cas-num"   id="cas-num">Казус 1</span>
    <span class="cas-sep"></span>
    <span class="cas-title" id="cas-title">—</span>
  </div>
  <div class="casus-body">
    <div class="casus-left">
      <div class="cas-top-block">
        <p class="cas-desc" id="cas-desc"></p>
        <p class="cas-q">Что делать?</p>

<!-- LAST SLIDE -->

  <video class="slide-bg" id="last-video" src="https://alexautro.github.io/apo_intern/images/last.mp4" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;pointer-events:none;"></video>
  <img class="popup" id="lp1" src="https://alexautro.github.io/apo_intern/images/last_1.png" alt="">
  <img class="popup" id="lp2" style="position:absolute;left:7.14%;top:70.97%;width:33.28%;height:21.78%;" src="https://alexautro.github.io/apo_intern/images/last_2.png" alt="">
  <img class="popup" id="lp3" src="https://alexautro.github.io/apo_intern/images/last_3.png" alt="">
  <div class="last-ov" id="lov2"></div>
  <div class="last-ov" id="lov3"></div>

<script>
'use strict';

const BASE = 'https://alexautro.github.io/apo_intern/images/';

const ICON_DIRS = {
  APO:  { dec:'apo_icon_left.png',   inc:'apo_icon_right.png'  },
  RAY:  { dec:'heaven_icon.png',      inc:'heaven_icon.png'     },
  AD:   { dec:'Hell_icon_left.png',   inc:'Hell_icon_right.png' },
  NORM: { dec:'world_icon_left.png',  inc:'world_icon_right.png'}
};
const SKEYS  = ['APO','RAY','AD','NORM'];
const SLABELS= {APO:'АПО',RAY:'РАЙ',AD:'АД',NORM:'НОРМ'};
const FORDER = ['RAY','AD','NORM','APO'];

const FINALS = [
  {id:1, r:{APO:[0,20],  RAY:[50,80], AD:[0,40],  NORM:[60,100]}},  // без изменений
  {id:2, r:{APO:[30,60], RAY:[40,70], AD:[40,70], NORM:[40,70] }},  // без изменений
  {id:3, r:{APO:[0,20],  RAY:[80,100],AD:[0,30],  NORM:[70,100]}},  // без изменений
  {id:4, r:{APO:[70,100],RAY:[40,65], AD:[70,100],NORM:[0,30]  }},  // APO снижен до 70, RAY расширен до 40-65
  {id:5, r:{APO:[30,60], RAY:[0,35],  AD:[50,90], NORM:[20,55] }},  // RAY расширен до 35, AD поднят до 50-90
  {id:6, r:{APO:[0,15],  RAY:[80,100],AD:[31,50], NORM:[70,100]}},  // AD скорректирован до 31-50 (не пересекается с Ф3)
  {id:7, r:{APO:[30,65], RAY:[22,45], AD:[70,100],NORM:[0,45]  }},  // RAY расширен до 22-45, AD снижен до 70
];

// ── STATE ──
let DATA=null, state={APO:10,RAY:50,AD:50,NORM:80}, prev={...state};
let casIdx=0, selOpt=null, curSlide=null;

const clamp = v => Math.max(0,Math.min(100,v));

// Typography: non-breaking space after short prepositions/conjunctions
function typograph(text){
  // Match preposition/conjunction preceded by space or start of string,
  // followed by space — works correctly with Cyrillic
  return text.replace(/(^|\s)(в|на|с|к|о|об|из|по|за|от|до|не|но|а|и|или|то|же|бы|ли|как|так|для|при|без|над|под|про|уже|ещё|это|его|её|их|всё|был|была|были)\s+/gim,
    (m, before, p1) => before + p1 + '\u00A0');
}

function applyDelta(d){
  prev={...state};
  SKEYS.forEach(k=>state[k]=clamp(state[k]+(d[k]||0)));
}

function chooseFinal(){
  // First try to find a final where ALL 4 scales match
  const perfect = FINALS.find(f => SKEYS.every(k=>{ const[lo,hi]=f.r[k]; return state[k]>=lo&&state[k]<=hi; }));
  if(perfect) return perfect;
  // Fallback: most matching scales
  let best=FINALS[0],bs=-1;
  FINALS.forEach(f=>{
    let sc=0;
    SKEYS.forEach(k=>{const[lo,hi]=f.r[k];if(state[k]>=lo&&state[k]<=hi)sc++;});
    if(sc>bs){bs=sc;best=f;}
  });
  return best;
}

// ── SLIDE TRANSITION ──
function showSlide(id){
  return new Promise(res=>{
    const nxt=document.getElementById(id);
    if(!nxt){res();return;}
    const prv=curSlide?document.getElementById(curSlide):null;
    curSlide=id;
    if(prv&&prv!==nxt){
      prv.classList.remove('active','visible');
    }
    launch(nxt,res);
  });
}
function launch(el,cb){
  el.classList.add('active');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.classList.add('visible');
    setTimeout(cb,560);
  }));
}

// ── SCALES PANEL ──
// ── Scale positions per spec (% of slide) ──
// ── Scale icon positions (top-left corner, % of slide) ──
// Icon size: 10.6% of slide height (square)
// Delta position and size
const SCALE_ICON_POS = {
  APO:  { x:5.05,  y:8.08,  dx:40.98, dy:12.12 },
  RAY:  { x:15.28, y:24.98, dx:40.98, dy:28.35 },
  AD:   { x:15.28, y:41.31, dx:40.98, dy:45.56 },
  NORM: { x:22.95, y:57.58, dx:40.98, dy:62.31 },
};
const ICON_SIZE=10.6; // % of slide HEIGHT (square icon)
// Icon width in % of slide WIDTH = 10.6% * (9/16) ≈ 5.96%
const ICON_SIZE_W = ICON_SIZE * 9/16;

function mkScalesPanel(pfx){
  const panel=document.createElement('div');
  panel.className='scales-panel'; // position:absolute; inset:0
  SKEYS.forEach(k=>{
    const pos=SCALE_ICON_POS[k];

    // Icon: positioned by top-left corner, square via % height
    const icon=document.createElement('img');
    icon.id=`${pfx}i${k}`;
    icon.src=BASE+ICON_DIRS[k].inc;
    icon.alt='';
    const glowColors = {APO:'rgba(255,92,0,0.6)',RAY:'rgba(0,176,240,0.6)',AD:'rgba(255,92,0,0.6)',NORM:'rgba(146,208,80,0.6)'};
    const glow = glowColors[k] || 'rgba(255,255,255,0.6)';
    icon.style.cssText=`
      position:absolute;
      left:${pos.x}%;
      top:${pos.y}%;
      height:${ICON_SIZE}%;
      width:auto;
      object-fit:contain;
      z-index:5;
      opacity:1;
    `;
    panel.appendChild(icon);

    // Delta score label
    const delta=document.createElement('div');
    delta.id=`${pfx}d${k}`;
    delta.style.cssText=`
      position:absolute;
      left:${pos.dx}%;
      top:${pos.dy}%;
      height:6.56%;
      display:flex;
      align-items:center;
      font-family:'Playfair Display',serif;
      font-weight:700;
      font-size:36px;
      color:#FCF6D9;
      text-shadow:0 1px 3px rgba(0,0,0,.8);
      opacity:1;
      white-space:nowrap;
      z-index:999;
    `;
    panel.appendChild(delta);
  });
  return panel;
}

// TAPE_LEFT=2.5%, TAPE_RIGHT=34.01%, TAPE_W=31.51%
// Icon width = ICON_SIZE(10.6% height) * 9/16 ≈ 5.96% width
// Icon travels: left = TAPE_LEFT + (value/100) * (TAPE_W - ICON_SIZE_W)
const TAPE_LEFT_PCT = 2.5;
const TAPE_W_PCT    = 31.51;
const ICON_W_PCT    = 10.6 * 9 / 16; // ~5.96% of slide width (landscape)

// Portrait: slide is 9:16, icon width in % of slide width = 10.6% * 16/9
const TAPE_LEFT_PCT_P = 2.5;
const TAPE_W_PCT_P    = 31.51;
const ICON_W_PCT_P    = 10.6 * 16 / 9; // ~18.84% of slide width (portrait)

const isPortrait = () => window.matchMedia('(orientation: portrait)').matches;

function renderScales(pfx, anim, prevSnap){
  const p = prevSnap || prev;
  SKEYS.forEach(k=>{
    const icon = document.getElementById(`${pfx}i${k}`);
    const delt = document.getElementById(`${pfx}d${k}`);
    if(!icon) return;

    const diff = state[k] - p[k];

    // Update icon image based on direction
    icon.src = BASE + ICON_DIRS[k][diff >= 0 ? 'inc' : 'dec'];

    // Calculate positions — use portrait constants if in portrait mode
    const tapeLeft = isPortrait() ? TAPE_LEFT_PCT_P : TAPE_LEFT_PCT;
    const tapeW    = isPortrait() ? TAPE_W_PCT_P    : TAPE_W_PCT;
    const iconW    = isPortrait() ? ICON_W_PCT_P    : ICON_W_PCT;
    const startPct = tapeLeft + (p[k] / 100) * (tapeW - iconW);
    const endPct   = tapeLeft + (state[k] / 100) * (tapeW - iconW);

    // Place icon at PREV position instantly, fully visible
    icon.style.transition = 'none';
    icon.style.opacity = '1';
    icon.style.left = startPct + '%';

    // Then animate to current position with ease-in-out
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      icon.style.transition = 'left 0.8s cubic-bezier(.45,0,.55,1)';
      icon.style.left = endPct + '%';
    }));

    // Show absolute value of scale
    if(delt){
      if(state[k] === 100){
        delt.textContent = '100';
        delt.style.color = '#92D050';
      } else if(state[k] === 0){
        delt.textContent = '0';
        delt.style.color = '#FF5C00';
      } else {
        delt.textContent = state[k];
        delt.style.color = '#FCF6D9';
      }
    }
  });
}

function preloadImg(url){ if(url){ const i=new Image(); i.src=url; } }

function goCasus(idx){
  casIdx=idx; selOpt=null;
  const sit=DATA.situations[idx];
  // Preload next casus image + map background in background
  const next=DATA.situations[idx+1];
  if(next){ setTimeout(()=>{ preloadImg(next.image); preloadImg(next.background); },300); }
  document.getElementById('cas-num').textContent   = sit.casus + '.';
  document.getElementById('cas-title').textContent = sit.title;
  // Split description into sentences, each on new line, apply typography
  const sentences = typograph(sit.description.replace(/([.!?])\s+/g, '$1\n').trim());
  document.getElementById('cas-desc').textContent = sentences;
  document.getElementById('cas-img').src           = sit.image||'';

  // Reset submit button
  const btnSubmit = document.getElementById('btn-submit');
  if(btnSubmit) btnSubmit.disabled = true;

  const list=document.getElementById('options-list');
  list.innerHTML='';
  sit.options.forEach(opt=>{
    const li=document.createElement('li');
    li.className='opt';
    li.innerHTML=`<div class="opt-radio"></div>
      <div class="opt-text">${typograph(opt.label)}</div>`;
    li.onclick=()=>{
      list.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      li.classList.add('sel');
      selOpt=opt;
      if(isPortrait()){
        // On mobile: activate button, wait for explicit confirm
        if(btnSubmit) btnSubmit.disabled = false;
      } else {
        // On desktop: submit immediately
        setTimeout(()=>submitChoice(), 300);
      }
    };
    list.appendChild(li);
  });
  showSlide('s-casus');
}

function submitChoice(){
  if(!selOpt)return;
  const snapPrev={...state};
  applyDelta(selOpt.delta);
  const report=selOpt.report;
  const isLast=casIdx===DATA.situations.length-1;
  if(isLast){ revealFinal(); }
  else { goMapSlide(casIdx,report,snapPrev); }
}

function goMapSlide(idx,report,snapPrev){
  const sid=`s-map${idx+1}`;
  const pfx=`m${idx+1}_`;
  const slide=document.getElementById(sid);
  if(!slide){ console.error('Map slide not found:',sid); return; }

  showSlide(sid).then(()=>{
    setTimeout(()=>renderScales(pfx, true, snapPrev), 100);

    // Show report
    const rep=document.getElementById(`rep${idx+1}`);
    if(rep){ rep.textContent=typograph(report); requestAnimationFrame(()=>rep.classList.add('show')); }

    // Wire next icon click
    const ico=document.getElementById(`ico${idx+1}`);
    if(ico){
      const nextIdx=idx+1;
      ico.onclick=(e)=>{ e.stopPropagation(); if(rep)rep.classList.remove('show'); goCasus(nextIdx); };
    }
  });
}

// ── EVENTS ──
function bindEvents(){
  // Direct bindings — most reliable, set after DOM is built
  const iconMap0 = document.getElementById('icon-map0');
  if(iconMap0) iconMap0.addEventListener('click', (e)=>{ e.stopPropagation(); goCasus(0); });

  const pi2 = document.getElementById('pi2');
  if(pi2) pi2.addEventListener('click', (e)=>{ e.stopPropagation(); goPrimaryMap(); });



  // Delegated fallback for dynamic elements (ico1-9, final buttons, last slide)
  document.addEventListener('click', e=>{
    const t = e.target;
    if(!t) return;
    const id     = t.id;
    const action = t.dataset.action;
    const fid    = t.dataset.fid;
    const casus  = t.dataset.gotoCasus;

    if(id==='pi2')          { goPrimaryMap(); return; }
    if(id==='icon-map0')    { goCasus(0); return; }
    if(casus !== undefined) {
      const rep = document.getElementById(`rep${parseInt(casus)}`);
      if(rep) rep.classList.remove('show');
      goCasus(parseInt(casus));
      return;
    }

    if(action==='next' && fid)         { showConclusion(parseInt(fid)); return; }
    if(action==='tolast')              { showLastSlide(); return; }
    if(id==='lp2'||id==='lov2')        { resetGame(); return; }
    if(id==='lp3'||id==='lov3')        { try{window.close();}catch(ex){} }
  });
}

function preloadImages(urls, onProgress){
  return new Promise(resolve=>{
    if(!urls.length){resolve();return;}
    let loaded=0;
    urls.forEach(src=>{
      const img=new Image();
      img.onload=img.onerror=()=>{
        loaded++;
        onProgress(loaded/urls.length*100);
        if(loaded===urls.length)resolve();
      };
      img.src=src;
    });
  });
}
