<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стажёр Апокалипсиса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #FCF6D9;
  --dark:  #1a1208;
  --gold:  #c8a84b;
}

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #0a0804;
  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

/* ━━━ SLIDE ENGINE ━━━ */
.slide {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  display: none;
  opacity: 0;
  transition: opacity 0.55s ease;
}
.slide.active  { display: flex; }
.slide.visible { opacity: 1; }

/* ━━━ SLIDE: INTRO VIDEO ━━━ */
#s-intro {
  background: #000;
  align-items: center; justify-content: center;
}
#intro-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
#btn-skip {
  position: absolute; bottom: 28px; right: 28px; z-index: 10;
  background: rgba(252,246,217,.12);
  border: 1px solid rgba(252,246,217,.35);
  color: var(--cream);
  padding: 8px 20px;
  font-family: 'Franklin Gothic Medium', Arial, sans-serif;
  font-size: 12px; letter-spacing: 1.5px; cursor: pointer;
  transition: background .25s;
}
#btn-skip:hover { background: rgba(252,246,217,.25); }

/* ━━━ FULL-SCREEN IMAGE SLIDE ━━━ */
.img-slide { position: relative; overflow: hidden; }
.slide-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}

/* ━━━ FLOATING POPUPS ━━━ */
.popup {
  position: absolute;
  top: 5%; left: 50%;
  transform: translateX(-50%);
  max-width: 68%; max-height: 28%;
  object-fit: contain;
  z-index: 5;
  opacity: 0; transition: opacity .8s ease;
}
.popup.p2 { top: 32%; }
.popup.p3 { top: 62%; }
.popup.show { opacity: 1; }
.popup.clickable { cursor: pointer; }
.popup.clickable:hover { filter: brightness(1.08); }

/* ━━━ MISSION ICON (pulsing) ━━━ */
.mission-icon {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%) scale(1);
  width: clamp(56px,7vw,90px);
  height: clamp(56px,7vw,90px);
  object-fit: contain; cursor: pointer; z-index: 10;
  animation: pulse 1.1s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: translate(-50%,-50%) scale(1);   }
  50%      { transform: translate(-50%,-50%) scale(1.2); }
}

/* ━━━ SCALES PANEL ━━━ */
.scales-panel {
  position: absolute; top: 14px; left: 14px; z-index: 20;
  display: flex; flex-direction: column; gap: 5px;
}
.scale-row {
  display: flex; align-items: center; gap: 6px;
}
.scale-lbl {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: 10px; color: var(--cream);
  text-shadow: 0 1px 4px rgba(0,0,0,.85);
  width: 34px; flex-shrink: 0;
}
.scale-tape {
  position: relative;
  width: 130px; height: 26px;
  border-radius: 3px; overflow: visible;
  background: linear-gradient(180deg,
    rgba(252,246,217,.88) 0%,
    rgba(235,220,160,.82) 50%,
    rgba(252,246,217,.88) 100%);
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.scale-fill {
  position: absolute; top: 0; left: 0;
  height: 100%; background: rgba(200,168,75,.35);
  border-radius: 3px; transition: width .7s cubic-bezier(.34,1.4,.64,1);
}
.scale-icon {
  position: absolute; top: 50%;
  transform: translateY(-50%);
  width: 24px; height: 24px;
  object-fit: contain; z-index: 2;
  transition: left .7s cubic-bezier(.34,1.4,.64,1);
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.6));
}
.scale-delta {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: 13px; color: var(--cream); min-width: 30px;
  text-shadow: 0 1px 3px rgba(0,0,0,.8);
  opacity: 0; transition: opacity .4s;
}
.scale-delta.show { opacity: 1; }

/* ━━━ REPORT BOX ━━━ */
.report-box {
  position: absolute; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  width: 84%; max-width: 680px;
  border: 1.5px solid var(--cream); border-radius: 3px;
  padding: 13px 18px;
  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(12px,1.4vh,15px); line-height: 1.55;
  color: var(--cream);
  background: rgba(20,12,4,.62);
  z-index: 15; opacity: 0; transition: opacity .6s ease .3s;
}
.report-box.show { opacity: 1; }

/* ━━━ SLIDE: CASUS ━━━ */
#s-casus {
  background: var(--cream);
  flex-direction: column;
}
.casus-header {
  display: flex; align-items: baseline;
  padding: clamp(8px,1.2vh,14px) 20px clamp(6px,1vh,10px);
  border-bottom: 1px solid rgba(26,18,8,.15);
  flex-shrink: 0;
}
.cas-num {
  font-family: 'Caveat', cursive;
  font-size: clamp(20px,3.2vh,34px);
  color: var(--dark); line-height: 1;
}
.cas-sep { width: 12px; }
.cas-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(16px,2.6vh,28px);
  color: var(--dark); line-height: 1;
}
.casus-body {
  display: flex; flex: 1; min-height: 0; overflow: hidden;
}
.casus-left {
  flex: 1; padding: clamp(10px,1.5vh,16px) 16px clamp(10px,1.5vh,16px) 20px;
  overflow-y: auto; display: flex; flex-direction: column;
  scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
}
.cas-desc {
  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(11px,1.55vh,15px); line-height: 1.58;
  color: var(--dark); margin-bottom: clamp(10px,1.4vh,16px);
}
.cas-q {
  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
  font-weight: bold;
  font-size: clamp(11px,1.55vh,15px);
  color: var(--dark); margin-bottom: 8px;
}
.options-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.opt {
  display: flex; align-items: flex-start; gap: 9px;
  cursor: pointer; padding: 7px 10px; border-radius: 4px;
  border: 1.5px solid transparent;
  transition: border-color .18s, background .18s;
}
.opt:hover { background: rgba(26,18,8,.05); border-color: rgba(26,18,8,.18); }
.opt.sel { background: rgba(200,168,75,.15); border-color: var(--gold); }
.opt-radio {
  width: 15px; height: 15px;
  border: 2px solid var(--dark); border-radius: 50%;
  flex-shrink: 0; margin-top: 2px; position: relative;
}
.opt.sel .opt-radio { border-color: var(--gold); }
.opt.sel .opt-radio::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 7px; height: 7px;
  background: var(--gold); border-radius: 50%;
}
.opt-text {
  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(11px,1.55vh,15px); line-height: 1.48;
  color: var(--dark);
}
.casus-right {
  width: 44%; flex-shrink: 0;
  position: relative; overflow: hidden;
}
.cas-img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  display: block;
}
.btn-submit {
  position: absolute; bottom: 14px; right: 14px;
  background: var(--dark); color: var(--cream);
  border: none; padding: 9px 20px;
  font-family: 'Playfair Display', serif; font-size: 13px;
  cursor: pointer; border-radius: 3px;
  opacity: 0; pointer-events: none;
  transition: opacity .3s, background .2s, transform .15s;
}
.btn-submit.show { opacity: 1; pointer-events: auto; }
.btn-submit:hover { background: #2c1e08; transform: scale(1.03); }

/* ━━━ FINAL OVERVIEW SLIDES ━━━ */
.s-final { position: relative; overflow: hidden; }
.final-scales {
  position: absolute; left: 5%; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 10px;
  z-index: 10; opacity: 0; transition: opacity .8s ease;
}
.final-scales.show { opacity: 1; }
.fs-item { display: flex; flex-direction: column; align-items: flex-start; }
.fs-name {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: 10px; color: var(--cream);
  text-shadow: 0 1px 5px rgba(0,0,0,.9);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.fs-val {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: clamp(26px,4.5vw,52px); color: var(--cream);
  text-shadow: 0 2px 8px rgba(0,0,0,.8), 0 0 24px rgba(200,168,75,.35);
  line-height: 1.05;
}
.final-formular {
  position: absolute; right: 5%; top: 50%;
  transform: translateY(-50%);
  max-width: 54%; max-height: 82%;
  object-fit: contain; z-index: 10;
  opacity: 0; transition: opacity .8s ease;
}
.final-formular.show { opacity: 1; }
.final-btn {
  position: absolute; bottom: 28px; right: 28px;
  z-index: 20; cursor: pointer;
  max-height: 58px; object-fit: contain;
  opacity: 0; transition: opacity .5s ease, transform .2s;
}
.final-btn.show { opacity: 1; }
.final-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<!-- INTRO VIDEO -->
<div class="slide" id="s-intro">
  <video id="intro-video" autoplay muted playsinline preload="auto">
    <source src="https://alexautro.github.io/apo_intern/images/intern_intro.mp4" type="video/mp4">
  </video>
  <button id="btn-skip">ПРОПУСТИТЬ →</button>
</div>

<!-- MAP INTRO -->
<div class="slide img-slide" id="s-map-intro">
  <img class="slide-bg" src="https://alexautro.github.io/apo_intern/images/map_intro.png" alt="">
  <img class="popup"              id="pi1" src="https://alexautro.github.io/apo_intern/images/map_intro_1.png" alt="">
  <img class="popup p2 clickable" id="pi2" src="https://alexautro.github.io/apo_intern/images/map_intro_2.png" alt="">
</div>

<!-- PRIMARY MAP -->
<div class="slide img-slide" id="s-map0">
  <img class="slide-bg" src="https://alexautro.github.io/apo_intern/images/map_00.png" alt="">
  <img class="mission-icon" id="icon-map0"
       src="https://alexautro.github.io/apo_intern/images/mission_01.png" alt="">
</div>

<!-- CASUS SLIDE -->
<div class="slide" id="s-casus">
  <div class="casus-header">
    <span class="cas-num"   id="cas-num">Казус 1</span>
    <span class="cas-sep"></span>
    <span class="cas-title" id="cas-title">—</span>
  </div>
  <div class="casus-body">
    <div class="casus-left">
      <p  class="cas-desc" id="cas-desc"></p>
      <p  class="cas-q">Что делать?</p>
      <ul class="options-list" id="options-list"></ul>
    </div>
    <div class="casus-right">
      <img class="cas-img" id="cas-img" src="" alt="">
      <button class="btn-submit" id="btn-submit">Подтвердить выбор →</button>
    </div>
  </div>
</div>

<!-- DYNAMIC SLIDES (maps 1-9, finals, conclusions) -->
<div id="dyn"></div>

<!-- LAST SLIDE -->
<div class="slide img-slide" id="s-last">
  <img class="slide-bg" src="https://alexautro.github.io/apo_intern/images/last.png" alt="">
  <img class="popup clickable"           id="lp1" src="https://alexautro.github.io/apo_intern/images/last_1.png" alt="">
  <img class="popup p2 clickable"        id="lp2" src="https://alexautro.github.io/apo_intern/images/last_2.png" alt="">
  <img class="popup p3 clickable"        id="lp3" src="https://alexautro.github.io/apo_intern/images/last_3.png" alt="">
</div>

<script>
'use strict';

const BASE = 'https://alexautro.github.io/apo_intern/images/';

const ICON_DIRS = {
  APO:  { dec:'apo_icon_left.png',   inc:'apo_icon_right.png'  },
  RAY:  { dec:'heaven_icon.png',      inc:'heaven_icon.png'     },
  AD:   { dec:'Hell_icon_left.png',   inc:'Hell_icon_right.png' },
  NORM: { dec:'world_icon_left.png',  inc:'world_icon_right.png'}
};
const SKEYS  = ['APO','RAY','AD','NORM'];
const SLABELS= {APO:'АПО',RAY:'РАЙ',AD:'АД',NORM:'НОРМ'};
const FORDER = ['RAY','AD','NORM','APO'];

const FINALS = [
  {id:1, r:{APO:[0,20],  RAY:[50,80], AD:[0,40],  NORM:[60,100]}},
  {id:2, r:{APO:[30,60], RAY:[40,70], AD:[40,70], NORM:[40,70] }},
  {id:3, r:{APO:[0,20],  RAY:[80,100],AD:[0,30],  NORM:[70,100]}},
  {id:4, r:{APO:[80,100],RAY:[0,30],  AD:[70,100],NORM:[0,30]  }},
  {id:5, r:{APO:[30,60], RAY:[0,30],  AD:[0,30],  NORM:[20,50] }},
  {id:6, r:{APO:[0,50],  RAY:[80,100],AD:[0,20],  NORM:[40,70] }},
  {id:7, r:{APO:[30,60], RAY:[0,20],  AD:[80,100],NORM:[0,40]  }},
];

// ── STATE ──
let DATA=null, state={APO:10,RAY:50,AD:50,NORM:80}, prev={...state};
let casIdx=0, selOpt=null, curSlide=null;

const clamp = v => Math.max(0,Math.min(100,v));

function applyDelta(d){
  prev={...state};
  SKEYS.forEach(k=>state[k]=clamp(state[k]+(d[k]||0)));
}

function chooseFinal(){
  let best=FINALS[0],bs=-1;
  FINALS.forEach(f=>{
    let sc=0;
    SKEYS.forEach(k=>{const[lo,hi]=f.r[k];if(state[k]>=lo&&state[k]<=hi)sc++;});
    if(sc>bs){bs=sc;best=f;}
  });
  return best;
}

// ── SLIDE TRANSITION ──
function showSlide(id){
  return new Promise(res=>{
    const nxt=document.getElementById(id);
    if(!nxt){res();return;}
    const prv=curSlide?document.getElementById(curSlide):null;
    curSlide=id;
    if(prv&&prv!==nxt){
      prv.style.opacity='0';
      setTimeout(()=>{
        prv.classList.remove('active','visible');
        prv.style.opacity='';
        launch(nxt,res);
      },560);
    } else {
      if(prv)prv.classList.remove('active','visible');
      launch(nxt,res);
    }
  });
}
function launch(el,cb){
  el.classList.add('active');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.classList.add('visible');
    setTimeout(cb,560);
  }));
}

// ── SCALES PANEL ──
function mkScalesPanel(pfx){
  const panel=document.createElement('div');
  panel.className='scales-panel';
  SKEYS.forEach(k=>{
    const row=document.createElement('div');
    row.className='scale-row';
    row.innerHTML=`
      <div class="scale-lbl">${SLABELS[k]}</div>
      <div class="scale-tape">
        <div class="scale-fill" id="${pfx}f${k}" style="width:${state[k]}%"></div>
        <img class="scale-icon" id="${pfx}i${k}" src="${BASE}${ICON_DIRS[k].inc}" alt="">
      </div>
      <div class="scale-delta" id="${pfx}d${k}"></div>`;
    panel.appendChild(row);
  });
  return panel;
}

function renderScales(pfx,anim){
  SKEYS.forEach(k=>{
    const fill=document.getElementById(`${pfx}f${k}`);
    const icon=document.getElementById(`${pfx}i${k}`);
    const delt=document.getElementById(`${pfx}d${k}`);
    if(!fill||!icon)return;
    fill.style.width=state[k]+'%';
    const tw=(fill.parentElement||{offsetWidth:130}).offsetWidth;
    const iw=24,mg=3;
    icon.style.left=(mg+(state[k]/100)*(tw-iw-mg*2))+'px';
    const diff=state[k]-prev[k];
    icon.src=BASE+ICON_DIRS[k][diff>=0?'inc':'dec'];
    if(anim&&delt&&diff!==0){
      delt.textContent=(diff>0?'+':'')+diff;
      delt.style.color=diff>0?'#88e888':'#ff8888';
      delt.classList.add('show');
      setTimeout(()=>delt.classList.remove('show'),2800);
    }
  });
}

// ── BUILD DYNAMIC SLIDES ──
function buildSlides(){
  const c=document.getElementById('dyn');
  const sits=DATA.situations;

  // Map slides for casus 1-9
  for(let i=0;i<sits.length-1;i++){
    const sit=sits[i];
    const sid=`s-map${i+1}`;
    const pfx=`m${i+1}_`;

    let iconSrc=sit.icon
      ?(sit.icon.startsWith('http')?sit.icon:BASE+sit.icon)
      :BASE+`mission_${String(i+2).padStart(2,'0')}.png`;

    const el=document.createElement('div');
    el.className='slide img-slide';
    el.id=sid;

    const bg=document.createElement('img');
    bg.className='slide-bg';
    bg.src=sit.background||BASE+`map_${String(i+1).padStart(2,'0')}.png`;
    bg.alt='';
    el.appendChild(bg);

    el.appendChild(mkScalesPanel(pfx));

    const rep=document.createElement('div');
    rep.className='report-box';
    rep.id=`rep${i+1}`;
    el.appendChild(rep);

    const ico=document.createElement('img');
    ico.className='mission-icon';
    ico.id=`ico${i+1}`;
    ico.src=iconSrc;
    ico.alt='';
    el.appendChild(ico);

    c.appendChild(el);
  }

  // Final slides × 7
  FINALS.forEach(f=>{
    // Overview slide
    const ov=document.createElement('div');
    ov.className='slide img-slide s-final';
    ov.id=`sf${f.id}`;

    const bg=document.createElement('img');
    bg.className='slide-bg final-bg';
    bg.src=`${BASE}final_${f.id}0.png`;
    bg.alt='';

    const scDiv=document.createElement('div');
    scDiv.className='final-scales';
    scDiv.id=`fsc${f.id}`;
    FORDER.forEach(k=>{
      const item=document.createElement('div');
      item.className='fs-item';
      item.innerHTML=`<div class="fs-name">${SLABELS[k]}</div>
        <div class="fs-val" id="fv${f.id}${k}">0</div>`;
      scDiv.appendChild(item);
    });

    const form=document.createElement('img');
    form.className='final-formular';
    form.id=`ff${f.id}`;
    form.src=`${BASE}final_${f.id}0_formular.png`;
    form.alt='';

    const nb=document.createElement('img');
    nb.className='final-btn';
    nb.id=`fn${f.id}`;
    nb.src=BASE+'Next.png';
    nb.alt='Далее';
    nb.dataset.action='next';
    nb.dataset.fid=f.id;

    ov.appendChild(bg);ov.appendChild(scDiv);ov.appendChild(form);ov.appendChild(nb);
    c.appendChild(ov);

    // Conclusion slide
    const co=document.createElement('div');
    co.className='slide img-slide s-final';
    co.id=`sc${f.id}`;

    const cbg=document.createElement('img');
    cbg.className='slide-bg final-bg';
    cbg.src=`${BASE}final_${f.id}1.png`;
    cbg.alt='';

    const tb=document.createElement('img');
    tb.className='final-btn';
    tb.id=`ft${f.id}`;
    tb.src=BASE+'To_final.png';
    tb.alt='К финалу';
    tb.dataset.action='tolast';

    co.appendChild(cbg);co.appendChild(tb);
    c.appendChild(co);
  });
}

// ── FLOW ──
function startGame(){
  showSlide('s-intro');
  const vid=document.getElementById('intro-video');
  vid.play().catch(()=>{});
  vid.addEventListener('ended',goMapIntro,{once:true});
}

function goMapIntro(){
  showSlide('s-map-intro').then(()=>{
    setTimeout(()=>{
      document.getElementById('pi1').classList.add('show');
      setTimeout(()=>document.getElementById('pi2').classList.add('show'),1100);
    },350);
  });
}

function goPrimaryMap(){
  showSlide('s-map0');
}

function goCasus(idx){
  casIdx=idx; selOpt=null;
  const sit=DATA.situations[idx];
  document.getElementById('cas-num').textContent   = sit.casus;
  document.getElementById('cas-title').textContent = sit.title;
  document.getElementById('cas-desc').textContent  = sit.description;
  document.getElementById('cas-img').src           = sit.image||'';

  const list=document.getElementById('options-list');
  list.innerHTML='';
  sit.options.forEach(opt=>{
    const li=document.createElement('li');
    li.className='opt';
    li.innerHTML=`<div class="opt-radio"></div>
      <div class="opt-text">${opt.label}</div>`;
    li.onclick=()=>{
      list.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      li.classList.add('sel');
      selOpt=opt;
      document.getElementById('btn-submit').classList.add('show');
    };
    list.appendChild(li);
  });
  document.getElementById('btn-submit').classList.remove('show');
  showSlide('s-casus');
}

function submitChoice(){
  if(!selOpt)return;
  applyDelta(selOpt.delta);
  const report=selOpt.report;
  const isLast=casIdx===DATA.situations.length-1;
  if(isLast){ revealFinal(); }
  else { goMapSlide(casIdx,report); }
}

function goMapSlide(idx,report){
  const sid=`s-map${idx+1}`;
  const pfx=`m${idx+1}_`;
  const ico=document.getElementById(`ico${idx+1}`);

  showSlide(sid).then(()=>{
    const rep=document.getElementById(`rep${idx+1}`);
    if(rep){rep.textContent=report;setTimeout(()=>rep.classList.add('show'),200);}
    setTimeout(()=>renderScales(pfx,true),280);
    if(ico){
      ico.onclick=()=>{
        if(rep)rep.classList.remove('show');
        goCasus(idx+1);
      };
    }
  });
}

function revealFinal(){
  const f=chooseFinal();
  FORDER.forEach(k=>{
    const el=document.getElementById(`fv${f.id}${k}`);
    if(el)el.textContent=state[k];
  });
  showSlide(`sf${f.id}`).then(()=>{
    setTimeout(()=>{
      document.getElementById(`fsc${f.id}`)?.classList.add('show');
      setTimeout(()=>{
        document.getElementById(`ff${f.id}`)?.classList.add('show');
        setTimeout(()=>document.getElementById(`fn${f.id}`)?.classList.add('show'),900);
      },1100);
    },300);
  });
}

function showConclusion(fid){
  showSlide(`sc${fid}`).then(()=>{
    setTimeout(()=>document.getElementById(`ft${fid}`)?.classList.add('show'),500);
  });
}

function showLastSlide(){
  showSlide('s-last').then(()=>{
    const p1=document.getElementById('lp1');
    const p2=document.getElementById('lp2');
    const p3=document.getElementById('lp3');
    setTimeout(()=>{
      p1?.classList.add('show');
      setTimeout(()=>{
        p2?.classList.add('show');
        setTimeout(()=>{
          p3?.classList.add('show');
          setTimeout(()=>{if(p1){p1.style.transition='opacity .8s ease';p1.style.opacity='0';}},2000);
        },1000);
      },1000);
    },400);
  });
}

function resetGame(){
  const sv=DATA.startValues;
  state={APO:sv.APO??10,RAY:sv.RAY??50,AD:sv.AD??50,NORM:sv.NORM??80};
  prev={...state};
  casIdx=0;selOpt=null;
  // Reset UI state
  document.querySelectorAll('.popup').forEach(el=>{
    el.classList.remove('show');
    el.style.transition='';el.style.opacity='';
  });
  document.querySelectorAll('.final-scales,.final-formular,.final-btn').forEach(el=>el.classList.remove('show'));
  document.querySelectorAll('.report-box').forEach(el=>el.classList.remove('show'));
  goPrimaryMap();
}

// ── EVENTS ──
function bindEvents(){
  document.getElementById('btn-skip').onclick=goMapIntro;
  document.getElementById('pi2').onclick=goPrimaryMap;
  document.getElementById('icon-map0').onclick=()=>goCasus(0);
  document.getElementById('btn-submit').onclick=submitChoice;

  document.addEventListener('click',e=>{
    const t=e.target;
    if(!t)return;
    const action=t.dataset.action;
    const fid=t.dataset.fid;

    if(action==='next'&&fid) showConclusion(parseInt(fid));
    if(action==='tolast')    showLastSlide();
    if(t.id==='lp2')         resetGame();
    if(t.id==='lp3')         { try{window.close();}catch(ex){} }
  });
}

// ── INIT ──
async function init(){
  try{
    const r=await fetch('situation.json');
    DATA=await r.json();
  } catch(e){
    DATA={startValues:{APO:10,RAY:50,AD:50,NORM:80},situations:[]};
  }
  const sv=DATA.startValues||{};
  state={APO:sv.APO??10,RAY:sv.RAY??50,AD:sv.AD??50,NORM:sv.NORM??80};
  prev={...state};
  buildSlides();
  bindEvents();
  startGame();
}

init();
</script>
</body>
</html>
